<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huiiiii Car Racing</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <input type="checkbox" id="start" class="si">

    <div class="screen start-screen">
        <div class="start-bg"></div>
        <div class="start-content">
            <div class="logo">
                <span class="ln">NITRO</span>
                <span class="lr">RUSH</span>
            </div>
            <p class="tagline">ARCADE RACER</p>
            <label for="start" class="btn-start">▶ INSERT COIN</label>
            <div class="how">
                <p>MOVE YOUR MOUSE TO STEER</p>
                <p>DODGE THE TRAFFIC!</p>
            </div>
        </div>
    </div>

    <div class="screen game-screen">
        <div class="scanlines"></div>

        <div class="grass grass-l">
            <div class="gs"></div>
            <div class="tree t1"></div>
            <div class="tree t2"></div>
            <div class="tree t3"></div>
            <div class="tree t4"></div>
            <div class="tree t5"></div>
            <div class="tree t6"></div>
        </div>

        <div class="road">
            <div class="road-edge el"></div>
            <div class="road-edge er"></div>
            <div class="lane-line ll1"></div>
            <div class="lane-line ll2"></div>

            <div class="pcar">
                <div class="pw"></div>
                <div class="pe"></div>
            </div>

            <div class="ecar ec1"></div>
            <div class="ecar ec2"></div>
            <div class="ecar ec3"></div>
            <div class="ecar ec4"></div>
            <div class="ecar ec5"></div>
            <div class="ecar ec6"></div>
            <div class="ecar ec7"></div>
            <div class="ecar ec8"></div>
            <div class="ecar ec9"></div>
        </div>

        <div class="grass grass-r">
            <div class="gs"></div>
            <div class="tree t1"></div>
            <div class="tree t2"></div>
            <div class="tree t3"></div>
            <div class="tree t4"></div>
            <div class="tree t5"></div>
            <div class="tree t6"></div>
        </div>

        <div class="hud">
            <div class="hud-box">
                <span class="hl">SPD</span>
                <div class="bar">
                    <div class="sfill"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('start').onchange = function () {
            if (!this.checked) return;
            var road = document.querySelector('.road');
            var car = document.querySelector('.pcar');
            var cw = 46;
            road.onmousemove = function (e) {
                var r = road.getBoundingClientRect();
                var x = e.clientX - r.left - cw / 2;
                x = Math.max(10, Math.min(x, r.width - cw - 10));
                car.style.left = x + 'px';
            };
            road.ontouchmove = function (e) {
                var r = road.getBoundingClientRect();
                var x = e.touches[0].clientX - r.left - cw / 2;
                x = Math.max(10, Math.min(x, r.width - cw - 10));
                car.style.left = x + 'px';
                e.preventDefault();
            };
            var i = setInterval(function () { var p = car.getBoundingClientRect(); var c = document.querySelectorAll('.ecar'); for (var j = 0; j < c.length; j++) { var r = c[j].getBoundingClientRect(); if (p.left + 8 < r.right && p.right - 8 > r.left && p.top + 8 < r.bottom && p.bottom - 8 > r.top) { clearInterval(i); location.href = 'gameover.html'; } } }, 30);
        };
    </script>
</body>

</html>
